server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets (videos/images are already compressed).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: client-side routes like /projects/memory have no real file on disk, so
    # anything that isn't a real asset falls back to index.html for React Router to handle.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames, so built assets can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Videos are unhashed (public/); allow caching but let the browser revalidate. nginx serves
    # HTTP Range requests here by default, which is what gives <video> seek/scrub support.
    location /videos/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # index.html must never be cached, or clients pin a stale bundle after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
